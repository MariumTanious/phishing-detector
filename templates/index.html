<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phishing Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #22c55e;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .safe {
            color: #22c55e;
        }

        .bad {
            color: #ef4444;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🔐 Phishing Detector AI</h2>

    <input id="url" placeholder="Enter URL here...">

    <button onclick="check()">Detect</button>

    <div class="result" id="result"></div>
</div>

<script>
function check() {
    let url = document.getElementById("url").value;

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ url: url })
    })
    .then(res => res.json())
    .then(data => {
        let resultBox = document.getElementById("result");

        if (data.result.includes("Phishing")) {
            resultBox.innerHTML = "⚠️ " + data.result;
            resultBox.className = "result bad";
        } else {
            resultBox.innerHTML = "✅ " + data.result;
            resultBox.className = "result safe";
        }
    });
}
</script>

</body>
